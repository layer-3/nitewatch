services:
  nitewatch:
    build: .
    image: ghcr.io/layer-3/nitewatch:latest
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
    environment:
      NITEWATCH_CONFIG: /app/config.yaml
      NITEWATCH_DB_PATH: /app/data/nitewatch.db
    restart: unless-stopped
