services:
  nitewatch:
    build: .
    image: ghcr.io/layer-3/nitewatch:latest
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
    environment:
      NITEWATCH_CONFIG_PATH: /app/config.yaml
      NITEWATCH_DB_PATH: /app/data/nitewatch.db
      NITEWATCH_RPC_URL: changeme
      NITEWATCH_CONTRACT_ADDRESS: changeme
      NITEWATCH_PRIVATE_KEY: changeme
    restart: unless-stopped
